spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/resenasmix?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:bibliotecaduoc-clave-secreta-jwt-2026-cambiar-en-produccion}
springdoc.enable-hateoas=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

server.port=${SERVER_PORT:8083}
server.forward-headers-strategy=framework

logging.level.com.example.resenasmix=DEBUG

external.api.base-url=${EXTERNAL_API_BASE_URL:https://www.freetogame.com/api/games}