services:
  mysql:
    image: mysql:8.0
    container_name: resenasmix-mysql
    restart: always
    environment:
      MYSQL_DATABASE: resenasmix
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: resenasmix-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/resenasmix?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8083
      JWT_SECRET: bibliotecaduoc-clave-secreta-jwt-2026-cambiar-en-produccion
      EXTERNAL_API_BASE_URL: https://www.freetogame.com/api/games

volumes:
  mysql_data: